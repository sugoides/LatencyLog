name: Build and Release Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon="icon.ico" --add-data "icon.ico;." --name "LatencyLog" --clean main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LatencyLog-Windows
        path: dist/LatencyLog.exe

    - name: Check if Release Exists
      id: check_release
      shell: bash
      run: |
        TAG_NAME="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}"
        if gh release view "$TAG_NAME" >/dev/null 2>&1 && [ "$TAG_NAME" != "latest" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Release for $TAG_NAME already exists. Skipping release step."
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      if: steps.check_release.outputs.exists == 'false' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
        name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Continuous Build' }}
        files: dist/LatencyLog.exe
        draft: false
        prerelease: ${{ github.ref == 'refs/heads/main' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
