name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release Title'
        required: true
        default: 'Formal Release'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon="icon.ico" --add-data "icon.ico;." --name "LatencyLog" --clean main.py

    - name: Check if Tag Exists
      id: check_tag
      shell: bash
      run: |
        if gh release view "${{ github.event.inputs.version }}" >/dev/null 2>&1; then
          echo "error=Release already exists for tag ${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: ${{ github.event.inputs.release_name }}
        files: dist/LatencyLog.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
